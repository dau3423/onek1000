      - RUNTIME

  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY

  # ─── Opinet API 키 ───
  - variable: OPINET_API_KEY
    secret: OPINET_API_KEY
  # ─── 심사용 로그인 (심사 종료 후 제거) ───
  - variable: REVIEWER_EMAIL
    value: "test@onek1000.kr"
    availability:
      - BUILD
      - RUNTIME
  - variable: REVIEWER_PASSWORD
    secret: REVIEWER_PASSWORD
  - variable: PORTONE_API_SECRET
    secret: PORTONE_API_SECRET
  - variable: PORTONE_WEBHOOK_SECRET
    secret: PORTONE_WEBHOOK_SECRET
  # ─── 포트원(PortOne) v2 결제 ───
  # storeId/channelKey는 공개값(클라 노출 OK) → 미설정 시 코드 폴백 상수 사용.
  # 필요 시 NEXT_PUBLIC_PORTONE_STORE_ID / NEXT_PUBLIC_PORTONE_CHANNEL_* 를 value로 등록.
  # API Secret / Webhook Secret 은 서버 전용 시크릿(위에서 활성화됨):
  #   firebase apphosting:secrets:set PORTONE_API_SECRET
  #   firebase apphosting:secrets:set PORTONE_WEBHOOK_SECRET

  # ─── 아래는 발급/등록되는 대로 주석 해제 ───
  #
  # Supabase 발급 후:
  # - variable: NEXT_PUBLIC_SUPABASE_URL
  #   value: "https://xxx.supabase.co"
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
  #   value: "eyJ..."
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: SUPABASE_SERVICE_ROLE_KEY
  #   secret: SUPABASE_SERVICE_ROLE_KEY
  #
  # Upstash 발급 후:
  # - variable: UPSTASH_REDIS_REST_URL
  #   value: "https://xxx.upstash.io"
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: UPSTASH_REDIS_REST_TOKEN
  #   secret: UPSTASH_REDIS_REST_TOKEN
  #
  # 카카오 로그인:
  # - variable: KAKAO_CLIENT_ID
  #   value: "..."
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: KAKAO_CLIENT_SECRET
  #   secret: KAKAO_CLIENT_SECRET
  #
  # 구글 로그인:
  # - variable: GOOGLE_CLIENT_ID
  #   value: "..."
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: GOOGLE_CLIENT_SECRET
  #   secret: GOOGLE_CLIENT_SECRET
  #
  # 포트원(PortOne) 발급 후: 위 '포트원 v2 결제' 블록 주석 해제.
  #   PORTONE_API_SECRET(secret) / PORTONE_WEBHOOK_SECRET(secret) + (선택) NEXT_PUBLIC_PORTONE_*(value)
  #
  # Web Push (VAPID):
  # - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
  #   value: "..."
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: VAPID_PRIVATE_KEY
  #   secret: VAPID_PRIVATE_KEY
