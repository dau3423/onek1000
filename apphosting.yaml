  # ─── NextAuth ───
  # 커스텀 도메인 onek1000.kr 연결 완료 — 활성
  - variable: NEXTAUTH_URL
    value: "https://onek1000.kr"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXTAUTH_SECRET
