# Firebase App Hosting — Onek
# https://firebase.google.com/docs/app-hosting/configure
#
# 규칙:
#   - 'value:'에 빈 문자열을 두면 Firebase 파서가 invalid로 판단함.
#     → 값이 없는 항목은 주석 처리하거나 placeholder 값 사용.
#   - 'secret:'으로 참조하는 시크릿은 사전에 등록되어 있어야 함:
#     firebase apphosting:secrets:set <NAME>
#     firebase apphosting:secrets:grantaccess <NAME> --backend onek1000

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 3
  minInstances: 0
  concurrency: 80

env:
  # ─── Kakao Map (공개 가능) ───
  - variable: NEXT_PUBLIC_KAKAO_MAP_KEY
    value: "1023989d81f2656bd93d8ce80e1f4814"
    availability:
      - BUILD
      - RUNTIME

  # ─── 데이터 모드 ───
  - variable: NEXT_PUBLIC_USE_MOCK
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  # ─── Supabase ───
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: "https://qaszteoadtykuzjzqukm.supabase.co"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6In\
      Fhc3p0ZW9hZHR5a3V6anpxdWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzA3MzEsImV\
      4cCI6MjA5NTU0NjczMX0.REkhfvPicGWLAGYyiQhy_CPgSrtr8XEImvZxAxerv2Q"
    availability:
      - BUILD
      - RUNTIME

  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY

  # ─── Firebase Web SDK (apiKey 노출 정상) ───
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAosUb8ADQwn1MkNmy47IPB_BQ1S34bvzg"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "onek1000.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "onek1000"
    availability:
