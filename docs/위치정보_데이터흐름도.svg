<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" font-family="'Apple SD Gothic Neo','Noto Sans KR','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#334155" flood-opacity="0.16"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1280" height="560" fill="#FBFCFE"/>
  <rect x="0" y="0" width="1280" height="7" fill="#F59E0B"/>

  <text x="60" y="58" font-size="27" font-weight="800" fill="#1F2937">위치 정보 데이터 흐름도</text>
  <text x="60" y="86" font-size="14" fill="#6B7280">GPS 좌표는 100m 단위로 양자화해 캐싱에만 사용하며, 개인 위치를 서버 DB에 저장하지 않습니다.</text>

  <!-- zone labels -->
  <text x="62" y="128" font-size="13" font-weight="800" fill="#2563EB" letter-spacing="1">클라이언트 (사용자 기기)</text>
  <text x="62" y="332" font-size="13" font-weight="800" fill="#B45309" letter-spacing="1">서버</text>

  <!-- ===== TOP ROW: client 1,2,3 ===== -->
  <!-- node1 -->
  <g filter="url(#sh)"><rect x="60" y="140" width="340" height="110" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/></g>
  <circle cx="98" cy="178" r="18" fill="#2563EB"/><text x="98" y="184" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="128" y="184" font-size="17" font-weight="700" fill="#1E3A8A">기기 GPS 측위</text>
  <text x="84" y="222" font-size="13" fill="#1E40AF">navigator.geolocation 으로</text>
  <text x="84" y="242" font-size="13" fill="#1E40AF">현재 좌표 획득</text>

  <!-- node2 -->
  <g filter="url(#sh)"><rect x="470" y="140" width="340" height="110" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/></g>
  <circle cx="508" cy="178" r="18" fill="#2563EB"/><text x="508" y="184" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="538" y="184" font-size="17" font-weight="700" fill="#1E3A8A">위치 권한 동의</text>
  <text x="494" y="222" font-size="13" fill="#1E40AF">watchPosition 으로 100m 이상</text>
  <text x="494" y="242" font-size="13" fill="#1E40AF">의미있는 이동만 추적</text>

  <!-- node3 -->
  <g filter="url(#sh)"><rect x="880" y="140" width="340" height="110" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/></g>
  <circle cx="918" cy="178" r="18" fill="#2563EB"/><text x="918" y="184" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="948" y="184" font-size="17" font-weight="700" fill="#1E3A8A">좌표 100m 양자화</text>
  <text x="904" y="222" font-size="13" fill="#1E40AF">정밀 위치를 100m 격자로 반올림</text>
  <text x="904" y="242" font-size="13" fill="#1E40AF">(프라이버시 · 캐시 효율)</text>

  <line x1="405" y1="195" x2="465" y2="195" stroke="#64748B" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="815" y1="195" x2="875" y2="195" stroke="#64748B" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- down 3 -> 4 -->
  <line x1="1050" y1="252" x2="1050" y2="338" stroke="#64748B" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="1062" y="300" font-size="12" fill="#94A3B8">radius API 요청</text>

  <!-- ===== BOTTOM ROW: server 4,5 + output 6 (right->left) ===== -->
  <!-- node4 -->
  <g filter="url(#sh)"><rect x="880" y="350" width="340" height="110" rx="16" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/></g>
  <circle cx="918" cy="388" r="18" fill="#D97706"/><text x="918" y="394" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="948" y="394" font-size="17" font-weight="700" fill="#92400E">반경 조회 API</text>
  <text x="904" y="432" font-size="13" fill="#78350F">/api/stations/radius</text>
  <text x="904" y="452" font-size="13" fill="#78350F">양자화 좌표 + 반경 1km 수신</text>

  <!-- node5 -->
  <g filter="url(#sh)"><rect x="470" y="350" width="340" height="110" rx="16" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/></g>
  <circle cx="508" cy="388" r="18" fill="#D97706"/><text x="508" y="394" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="538" y="394" font-size="17" font-weight="700" fill="#92400E">반경 쿼리 · 캐시</text>
  <text x="494" y="432" font-size="13" fill="#78350F">Supabase PostGIS 반경 검색</text>
  <text x="494" y="452" font-size="13" fill="#78350F">+ Redis 캐시 (좌표 키)</text>

  <!-- node6 output -->
  <g filter="url(#sh)"><rect x="60" y="350" width="340" height="110" rx="16" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/></g>
  <circle cx="98" cy="388" r="18" fill="#16A34A"/><text x="98" y="394" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="128" y="394" font-size="17" font-weight="700" fill="#166534">최저가 → 사용자</text>
  <text x="84" y="432" font-size="13" fill="#15803D">1km 최저가 산출 → 상단 배너</text>
  <text x="84" y="452" font-size="13" fill="#15803D">알림 · 지도 마커 표시</text>

  <line x1="875" y1="405" x2="815" y2="405" stroke="#64748B" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="465" y1="405" x2="405" y2="405" stroke="#64748B" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- privacy footnote -->
  <rect x="60" y="496" width="1160" height="44" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="84" y="524" font-size="13.5" fill="#475569"><tspan font-weight="800" fill="#0F172A">개인정보  ·  </tspan>위치 권한은 사용자 동의 후에만 사용 · 양자화 좌표는 캐싱 목적에 한해 처리 · 개인 위치 이력은 서버에 저장하지 않음</text>
</svg>
